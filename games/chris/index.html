<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="header">
    <div id="title">♠ Blackjack</div>
    <div id="stats-row">
      <div class="stat"><div class="stat-val" id="stat-wins">0</div>Wins</div>
      <div class="stat"><div class="stat-val" id="stat-losses">0</div>Losses</div>
      <div class="stat"><div class="stat-val" id="stat-streak">0</div>Streak</div>
      <div class="stat"><div class="stat-val" id="stat-best">$0</div>Best</div>
    </div>
  </div>

  <div id="table">
    <div class="zone">
      <div class="zone-label">Dealer <span class="score-pill" id="dscore"></span></div>
      <div class="hand" id="dcards"></div>
    </div>
    <hr class="divider">
    <div id="msg-wrap"><div id="msg">Place your bet</div></div>
    <hr class="divider">
    <div class="zone">
      <div class="zone-label">You <span class="score-pill" id="pscore"></span></div>
      <div class="hand" id="pcards"></div>
    </div>
  </div>

  <div id="bottom">
    <div id="broke-banner">💸 Broke! Here's $100 to keep grinding...</div>

    <div id="balance-display">Balance: <span id="balance-val">$1000</span></div>

    <div id="chip-row">
      <div class="chip c5"   onclick="addBet(5)">$5</div>
      <div class="chip c25"  onclick="addBet(25)">$25</div>
      <div class="chip c50"  onclick="addBet(50)">$50</div>
      <div class="chip c100" onclick="addBet(100)">$100</div>
      <div class="chip c500" onclick="addBet(500)">$500</div>
    </div>

    <div id="bet-display">
      <span id="bet-label">Current Bet</span>
      <span id="bet-val">$0</span>
    </div>

    <div id="btn-row">
      <button class="btn" id="btn-clear"  onclick="clearBet()">Clear</button>
      <button class="btn" id="btn-allin"  onclick="allIn()">All In 🔥</button>
      <button class="btn" id="btn-deal"   onclick="deal()">Deal ➜</button>
      <button class="btn" id="btn-hit"    onclick="hit()"        disabled>Hit</button>
      <button class="btn" id="btn-stand"  onclick="stand()"      disabled>Stand</button>
      <button class="btn" id="btn-double" onclick="doubleDown()" disabled>Double ×2</button>
    </div>

    <div id="history"></div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>

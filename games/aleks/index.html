<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the R6 Character</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-shell quiz-shell">
    <header>
      <h1>Guess the R6 Character</h1>
      <p>Vaata pilti ja valitud nurgas olevat vihjet, siis arvesta Rainbow Six Siege tegelane.</p>
    </header>
    <div class="status-bar">
      <span id="round">Ring: 1 / 20</span>
      <span id="score">Skor: 0</span>
      <button id="restart">Alusta uuesti</button>
    </div>
    <div class="card">
      <div class="image-card" id="characterImage">
        <div class="image-label">Kasuta tegelase pilti</div>
      </div>
      <div class="hint-box">
        <p><strong>Vihje:</strong> <span id="hintText">Vali variant</span></p>
      </div>
      <div class="answers" id="answers"></div>
    </div>
    <div class="game-footer">
      <p>Vajuta vastust, et näha, kas said õige.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>

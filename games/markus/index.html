<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markus — mäng</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="c"></canvas>

  <div id="ui">
    <div id="hud">
      <div id="health-bar-wrap">
        <div id="health-label">INTEGRITY</div>
        <div id="health-bar-bg">
          <div id="health-bar" style="width:100%"></div>
        </div>
      </div>
      <div id="weapon-info">
        <div id="weapon-name">PISTOL</div>
        <div id="ammo-display">20 / 20</div>
        <div id="reload-msg">— RELOADING —</div>
      </div>
    </div>
    <div id="kill-counter">ELIMINATED: 0</div>
  </div>

  <div id="pick-hint">[E] PICK UP WEAPON</div>

  <div id="legend">
    ▲ RED — standard<br>
    ● PURPLE — tank (2× HP, slow)<br>
    ▲ YELLOW — scout (fast, 0.5× dmg)
  </div>

  <div id="game-over">
    <h1>TERMINATED</h1>
    <p id="final-score">ELIMINATED: 0</p>
    <button id="restart-btn" onclick="restartGame()">[ RESTART ]</button>
  </div>

  <script src="game.js"></script>
</body>
</html>

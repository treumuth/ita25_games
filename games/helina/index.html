<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fat Cat Hockey Quiz</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="layout">

    <div class="cat-side">
      <img
        src="https://cdn-icons-png.flaticon.com/512/616/616430.png"
        class="cat"
        id="cat"
        alt="Fat Cat"
      />

      <div class="weight-box">
        Weight: <span id="weight">1</span>
      </div>
    </div>

    <div class="game">
      <h1>🏒 Fat Cat Hockey Quiz 🐱</h1>

      <div class="question" id="question"></div>

      <div class="answers" id="answers"></div>

      <div class="stats">
        <span>Correct: <span id="correct">0</span>/20</span>
      </div>

      <div class="message" id="message"></div>

      <button class="restart" id="restartBtn">Play Again</button>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
